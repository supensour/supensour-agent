# yaml-language-server: $schema=https://raw.githubusercontent.com/supensour/supensour-agent/master/schemas/repo-config.schema.json
# Supensour repo config — settings baked into this plugin repo (not per-user, not per-target-repo).
# Read by the skills relative to their own directory (<repo-root>/supensour-config.yaml).

# Watermark shown on skill output (PR/MR comments, generated tests, local report, console).
# Placeholders: {skillName} → e.g. "supensour:review-code".
watermark_template: "Generated by {skillName} · suprayan@supensour · github.com/supensour/supensour-agent"
author: "supensour-agent"

# Per-skill config. Optional. A skill's watermark_template here overrides the top-level one.
# Scaffold for future per-skill settings.
skills:
  review-code:
    watermark_template: "Reviewed with skill {skillName} · suprayan@supensour"
    author: "supensour-agent@review-code"
  create-tests:
    watermark_template: "Generated with skill supensour:create-tests · suprayan@supensour · github.com/supensour/supensour-agent"
    author: "supensour-agent@create-tests"
    # watermark_template: "Test by {skillName} · suprayan@supensour"
